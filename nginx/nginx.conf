events {}

http {
  server {
    listen 80;

    resolver 127.0.0.11 valid=30s;  # ✅ Docker's internal DNS

    location / {
      proxy_pass http://client:80;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/ {
      proxy_pass http://api:8080/api/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }
  }
}